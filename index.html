<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Hanan ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: #121212;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.player {
  width: 100%;
  max-width: 380px;
  background: #181818;
  border-radius: 28px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  text-align: center;
}

.top-text {
  font-size: 14px;
  letter-spacing: 2px;
  opacity: 0.8;
  margin-bottom: 14px;
}

.heart {
  font-size: 28px;
  margin-bottom: 18px;
}

.cover {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 20px;
  object-fit: cover;
}

h1 {
  font-size: 32px;
  margin-bottom: 6px;
}

h2 {
  font-size: 18px;
  font-weight: normal;
  opacity: 0.8;
  margin-bottom: 20px;
}

audio {
  width: 100%;
  margin: 10px 0 20px;
}

.message {
  font-size: 20px;
  color: #ff8db3;
  margin-top: 10px;
  line-height: 1.6;
}

.small {
  font-size: 16px;
  opacity: 0.9;
  margin-bottom: 8px;
}

.footer {
  margin-top: 20px;
  color: #1db954;
  font-size: 15px;
}

  </style>
</head>
<body>
  <div class="player">
    <div class="top-text">PLAYING FOR SOMEONE SPECIAL</div>
    <div class="heart">💖</div><!-- Replace photo.jpg with her photo -->
<img src="photo.jpg" alt="Hanan" class="cover" />

<h1>Neen the world</h1>
<h2>Swabeeh</h2>

<!-- Replace song.mp3 with your song file -->
<audio controls autoplay>
  <source src="song.mp3" type="audio/mpeg" />
  Your browser does not support audio.
</audio>

<div class="small">Dedicated to <b>Hanan 💕</b></div>
<div class="message">You mean the world to me ❤️</div>

<div class="footer">For Hanan only 💚</div>

  </div>
</body>
</html>
